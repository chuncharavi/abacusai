kind = "web"
previewPath = "/"
title = "AbacusAI"
version = "1.0.0"
id = "artifacts/abacusai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25767

[services.development]
run = "pnpm --filter @workspace/abacusai run dev"

[services.env]
PORT = "25767"
BASE_PATH = "/"
NODE_ENV = "production"

[services.production]
build = ["sh", "-c", "pnpm --filter @workspace/abacusai run build && pnpm --filter @workspace/api-server run build"]
run = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.health.startup]
path = "/api/healthz"
