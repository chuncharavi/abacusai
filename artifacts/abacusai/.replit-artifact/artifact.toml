kind = "web"
previewPath = "/"
title = "AbacusAI"
version = "1.0.0"
id = "artifacts/abacusai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25767

[services.development]
run = "pnpm --filter @workspace/abacusai run dev"

[services.env]
PORT = "25767"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/abacusai", "run", "build"]
run = ["sh", "-c", "PORT=8080 pnpm --filter @workspace/abacusai run serve"]

[services.production.health.startup]
path = "/"
